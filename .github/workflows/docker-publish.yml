name: CI/CD Pipeline Dziennik Treningowy

on:
  push:
    branches: [ "main" ] 
    paths:
      - 'Projekt-Dziennik/**' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v3

      - name: Konfiguracja JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Logowanie do Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Budowa i Wypychanie obrazu Docker
        working-directory: ./Projekt-Dziennik
        run: |
          docker build -t wlodalos/dziennik:latest .
          docker push wlodalos/dziennik:latest